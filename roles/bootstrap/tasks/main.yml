---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - tmux
      - unzip
      - jq
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present

- name: Create user
  ansible.builtin.user:
    name: "{{ bootstrap_username }}"
    shell: "{{ bootstrap_shell }}"
    create_home: true
    state: present
  when: bootstrap_username | length > 0

- name: Add user to sudo group
  ansible.builtin.user:
    name: "{{ bootstrap_username }}"
    groups: sudo
    append: true
  when: bootstrap_username | length > 0 and bootstrap_user_sudo

- name: Configure passwordless sudo
  ansible.builtin.copy:
    content: "{{ bootstrap_username }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ bootstrap_username }}"
    mode: "0440"
    validate: "visudo -cf %s"
  when: bootstrap_username | length > 0 and bootstrap_user_sudo and bootstrap_passwordless_sudo

- name: Configure sudo with password
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ bootstrap_username }}"
    state: absent
  when: bootstrap_username | length > 0 and bootstrap_user_sudo and not bootstrap_passwordless_sudo

- name: Fetch SSH keys from GitHub
  ansible.builtin.uri:
    url: "https://github.com/{{ bootstrap_github_username }}.keys"
    return_content: true
  register: github_keys
  when: bootstrap_username | length > 0 and bootstrap_github_username | length > 0

- name: Set combined SSH keys
  ansible.builtin.set_fact:
    all_ssh_keys: "{{ bootstrap_ssh_pubkeys + (github_keys.content | default('') | split('\n') | select('match', '^ssh-') | list) }}"
  when: bootstrap_username | length > 0

- name: Create .ssh directory
  ansible.builtin.file:
    path: "/home/{{ bootstrap_username }}/.ssh"
    state: directory
    owner: "{{ bootstrap_username }}"
    group: "{{ bootstrap_username }}"
    mode: "0700"
  when: bootstrap_username | length > 0

- name: Add SSH authorized keys
  ansible.builtin.authorized_key:
    user: "{{ bootstrap_username }}"
    key: "{{ item }}"
    state: present
  loop: "{{ all_ssh_keys | default([]) }}"
  when: bootstrap_username | length > 0 and (all_ssh_keys | default([]) | length > 0)

- name: Add bashrc extras
  ansible.builtin.blockinfile:
    path: "/home/{{ bootstrap_username }}/.bashrc"
    marker: "# {mark} MANAGED BY ANSIBLE"
    block: "{{ bootstrap_bashrc_extras }}"
    create: true
    owner: "{{ bootstrap_username }}"
    group: "{{ bootstrap_username }}"
    mode: "0644"
  when: bootstrap_username | length > 0 and bootstrap_bashrc_extras | length > 0

- name: Add inputrc extras
  ansible.builtin.blockinfile:
    path: "/home/{{ bootstrap_username }}/.inputrc"
    marker: "# {mark} MANAGED BY ANSIBLE"
    block: "{{ bootstrap_inputrc_extras }}"
    create: true
    owner: "{{ bootstrap_username }}"
    group: "{{ bootstrap_username }}"
    mode: "0644"
  when: bootstrap_username | length > 0 and bootstrap_inputrc_extras | length > 0

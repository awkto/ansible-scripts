---
- name: Create openbao system user
  ansible.builtin.user:
    name: openbao
    system: true
    shell: /usr/sbin/nologin
    home: /opt/openbao
    create_home: true

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: openbao
    group: openbao
    mode: "0750"
  loop:
    - /opt/openbao/data
    - /etc/openbao

- name: Download OpenBao deb package
  ansible.builtin.get_url:
    url: "https://github.com/openbao/openbao/releases/download/v{{ openbao_version }}/bao_{{ openbao_version }}_linux_{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}.deb"
    dest: "/tmp/openbao_{{ openbao_version }}.deb"
    mode: "0644"

- name: Install OpenBao deb
  ansible.builtin.apt:
    deb: "/tmp/openbao_{{ openbao_version }}.deb"

- name: Write OpenBao config (prod)
  ansible.builtin.template:
    src: config.hcl.j2
    dest: /etc/openbao/config.hcl
    owner: openbao
    group: openbao
    mode: "0640"
  when: openbao_mode == "prod"
  notify: restart openbao

- name: Write auto-unseal script (prod)
  ansible.builtin.template:
    src: unseal.sh.j2
    dest: /opt/openbao/unseal.sh
    owner: openbao
    group: openbao
    mode: "0750"
  when: openbao_mode == "prod"

- name: Write systemd service (prod)
  ansible.builtin.template:
    src: openbao-prod.service.j2
    dest: /etc/systemd/system/openbao.service
    mode: "0644"
  when: openbao_mode == "prod"
  notify:
    - daemon reload
    - restart openbao

- name: Write systemd service (dev)
  ansible.builtin.template:
    src: openbao-dev.service.j2
    dest: /etc/systemd/system/openbao.service
    mode: "0644"
  when: openbao_mode == "dev"
  notify:
    - daemon reload
    - restart openbao

- name: Enable and start OpenBao
  ansible.builtin.systemd:
    name: openbao
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for OpenBao API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_listen_address.split(':')[1] }}/v1/sys/health"
    status_code: [200, 429, 501, 503]
  register: health
  retries: 10
  delay: 3
  until: health.status in [200, 429, 501, 503]

- name: Initialize OpenBao (prod, first time)
  when: openbao_mode == "prod" and health.status == 501
  block:
    - name: Initialize vault
      ansible.builtin.command: bao operator init -key-shares=1 -key-threshold=1 -format=json
      environment:
        BAO_ADDR: "http://127.0.0.1:{{ openbao_listen_address.split(':')[1] }}"
      register: init_output
      no_log: true

    - name: Save init keys
      ansible.builtin.copy:
        content: "{{ init_output.stdout }}"
        dest: /opt/openbao/init-keys.json
        owner: openbao
        group: openbao
        mode: "0600"

    - name: Unseal
      ansible.builtin.command: bao operator unseal {{ (init_output.stdout | from_json).unseal_keys_b64[0] }}
      environment:
        BAO_ADDR: "http://127.0.0.1:{{ openbao_listen_address.split(':')[1] }}"
      no_log: true

    - name: Display root token
      ansible.builtin.debug:
        msg: "Root token saved to /opt/openbao/init-keys.json"

- name: Display dev mode info
  ansible.builtin.debug:
    msg: "OpenBao running in dev mode. Root token: {{ openbao_dev_root_token }}. Data is NOT persistent."
  when: openbao_mode == "dev"

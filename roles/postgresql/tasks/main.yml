---
- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - postgresql-client
      - python3-psycopg2
    state: present
    update_cache: true

- name: Set listen_addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: restart postgresql

- name: Add pg_hba entry for md5 auth
  when: postgresql_hba_cidr | length > 0
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    line: "host    all    all    {{ postgresql_hba_cidr }}    md5"
    insertafter: "^# IPv4 local connections"
  notify: restart postgresql

- name: Enable and start PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    enabled: true
    state: started

- name: Flush handlers before creating db/user
  ansible.builtin.meta: flush_handlers

- name: Create database
  when: postgresql_db | length > 0
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ postgresql_db }}"
    state: present

- name: Create user
  when: postgresql_user | length > 0
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ postgresql_user }}"
    password: "{{ postgresql_password }}"
    state: present

- name: Grant privileges on database
  when: postgresql_grant_db and postgresql_db | length > 0 and postgresql_user | length > 0
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: "{{ postgresql_db }}"
    roles: "{{ postgresql_user }}"
    type: database
    privs: ALL
    state: present
